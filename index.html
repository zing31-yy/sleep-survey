<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEP SLEEP LAB | 科学睡眠测评</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --g-blue: #4285F4; --g-red: #EA4335; --g-yellow: #FBBC05; --g-green: #34A853;
            --g-gray: #202124; --g-sub: #70757a; --bg-light: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Google Sans', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-light); color: var(--g-gray);
            -webkit-font-smoothing: antialiased;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .container { width: 90%; max-width: 800px; padding: 40px; text-align: center; position: relative; }

        /* Logo */
        .logo-box { margin-bottom: 30px; }
        .logo-svg { width: 60px; height: 60px; }

        /* 首页 */
        .home-title { font-size: 42px; font-weight: 500; letter-spacing: 2px; margin: 10px 0; }
        .home-sub { color: var(--g-sub); font-size: 18px; margin-bottom: 40px; letter-spacing: 4px; }
        .feature-tags { font-size: 14px; font-weight: 500; color: #9aa0a6; letter-spacing: 2px; margin-bottom: 50px; }

        /* 进度条 */
        .progress-bar {
            position: absolute; top: 0; left: 0; width: 0%; height: 4px;
            background: linear-gradient(to right, var(--g-blue), var(--g-red), var(--g-yellow), var(--g-green));
            transition: width 0.4s ease;
        }

        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }

        .q-number { font-size: 13px; font-weight: 500; color: var(--g-sub); margin-bottom: 10px; text-transform: uppercase; }
        .q-title { font-size: 26px; font-weight: 400; margin-bottom: 40px; line-height: 1.5; }
        .q-desc { font-size: 14px; color: var(--g-sub); margin-top: -30px; margin-bottom: 30px; }

        /* 选项 */
        .options-grid { display: flex; flex-direction: column; gap: 12px; max-width: 550px; margin: 0 auto; }
        .option-item {
            padding: 16px 24px; border: 1px solid #DADCE0; border-radius: 24px;
            background: #FFF; cursor: pointer; transition: all 0.2s; font-size: 16px; text-align: left;
        }
        .option-item:hover { background-color: #F8F9FA; border-color: var(--g-blue); }
        .option-item.selected { background-color: #E8F0FE; border-color: var(--g-blue); color: var(--g-blue); font-weight: 500; }

        .btn-main {
            background-color: #f8f9fa; color: #3c4043; border: 1px solid #f8f9fa;
            padding: 10px 24px; cursor: pointer; font-size: 14px; font-weight: 500;
            border-radius: 4px; transition: all 0.2s; margin-top: 30px;
        }
        .btn-main:hover { border: 1px solid #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        .back-btn { position: absolute; top: -20px; left: 0; background: none; border: none; color: var(--g-sub); cursor: pointer; font-size: 14px; }

        /* 加载动画 */
        .spinner-box { margin-bottom: 30px; display: flex; justify-content: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { background: var(--g-blue); animation-delay: -0.32s; }
        .dot:nth-child(2) { background: var(--g-red); animation-delay: -0.16s; }
        .dot:nth-child(3) { background: var(--g-yellow); }
        .dot:nth-child(4) { background: var(--g-green); animation-delay: 0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        /* 警告卡片 */
        .warning-box { background: #FFF8E1; border-radius: 12px; padding: 25px; margin-bottom: 30px; text-align: left; line-height: 1.6; font-size: 15px; border-left: 5px solid var(--g-yellow); color: #5D4037; }

        /* 总结扉页 */
        .summary-container { border-left: 1px solid #EBEBEB; padding: 40px 60px; text-align: left; margin: 0 auto; max-width: 600px; }
        .summary-header { font-family: 'Noto Serif SC', serif; font-size: 32px; color: var(--g-gray); margin-bottom: 60px; }
        .summary-list { list-style: none; padding: 0; }
        .summary-list li { font-size: 18px; margin-bottom: 30px; letter-spacing: 1px; color: #3C4043; border-bottom: 1px solid #F1F3F4; padding-bottom: 15px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div class="progress-bar" id="p-bar"></div>
    <div class="container">
        <div class="logo-box">
            <svg class="logo-svg" viewBox="0 0 100 100">
                <path d="M50 15 Q35 45 35 65 A15 15 0 0 0 65 65 Q65 45 50 15" fill="#4285F4" opacity="0.9"/>
                <path d="M30 35 Q15 65 15 85 A15 15 0 0 0 45 85 Q45 65 30 35" fill="#34A853" opacity="0.8"/>
                <path d="M70 35 Q55 65 55 85 A15 15 0 0 0 85 85 Q85 65 70 35" fill="#EA4335" opacity="0.8"/>
            </svg>
        </div>

        <div id="page-home" class="page active">
            <h1 class="home-title">DEEP SLEEP LAB</h1>
            <p class="home-sub">找回失去的睡眠</p>
            <div class="feature-tags">无需药物 ｜ 无痛干预 ｜ 21天重塑睡眠</div>
            <button class="btn-main" onclick="nextPage('q1')" style="padding: 12px 40px; font-size: 16px;">开始免费测评</button>
        </div>

        <div id="question-container"></div>
        <div id="page-loading" class="page">
            <div class="spinner-box"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <h2 style="font-weight: 400;">致 每一位渴望好眠的旅人</h2>
            <p style="color:var(--g-sub)">正在为您量身定制睡眠改善方案...</p>
        </div>
        <div id="result-container"></div>
    </div>
</div>

<script>
    const qData = [
        { id: 'q1', type: 'radio', title: '您的年龄是？', options: [['A','18岁以下'],['B','18-25岁'],['C','26-35岁'],['D','36-50岁'],['E','50岁以上']] },
        { id: 'q2', type: 'radio', title: '您的性别？', options: [['A','男性'],['B','女性'],['C','其他/不愿透露']] },
        { id: 'q3', type: 'radio', title: '您目前平均每晚睡眠时长是多少？', options: [['A','不足6小时'],['B','6-8小时（不含）'],['C','8小时及以上']] },
        { id: 'q4', type: 'checkbox', title: '您目前最主要的睡眠问题是？（可多选）', options: [['A','入睡困难'],['B','睡眠浅、容易醒'],['C','早醒'],['D','晨起疲累'],['E','想进一步提升']] },
        { id: 'q5', type: 'radio', title: '您平均每周加班情况是？', options: [['A','几乎不加班'],['B','偶尔加班'],['C','经常加班'],['D','长期高强度加班']] },
        { id: 'q6', type: 'checkbox', title: '您是否有以下健康问题？（可多选）', options: [['A','慢性疼痛'],['B','呼吸问题'],['C','心理问题'],['D','正在服用可能影响睡眠的药物'],['E','以上都没有']] },
        { id: 'q7', type: 'checkbox', title: '您是否有饮用含咖啡因饮品的习惯？（可多选）', options: [['A','咖啡'],['B','茶饮'],['C','可乐/奶茶/能量饮料'],['D','不喝/很少喝']] },
        { id: 'q8', type: 'radio', title: '您的睡前1小时通常做什么？', options: [['A','玩手机/ipad等'],['B','纸质阅读/听音乐或播客'],['C','瑜伽或冥想等放松活动'],['D','工作或处理事务']] },
        { id: 'q9', type: 'radio', title: '您的卧室夜间温度通常是多少？', options: [['A','18-22℃'],['B','23-26℃'],['C','18℃以下或27℃以上'],['D','不确定/没关注过']] },
        { id: 'q10', type: 'radio', title: '您的起床时间是否固定？', options: [['A','每天固定时间'],['B','周末晚起1-2小时'],['C','时间不规律']] },
        { id: 'q11', type: 'radio', title: '起床多久后接触自然光照？', options: [['A','30分钟内'],['B','30-90分钟'],['C','超过90分钟'],['D','没留意']] },
        { id: 'q12', type: 'radio', title: '起床后多久喝第一杯含咖啡因饮品？', options: [['A','30分钟内'],['B','30-90分钟'],['C','超过90分钟'],['D','偶尔喝/不喝']] },
        { id: 'q13', type: 'radio', title: '您通常进行剧烈运动的时间？', desc: '剧烈运动定义：心率达到140次/分钟以上，如快跑、动感单车等', options: [['A','早晨 6-9 点'],['B','下午 4-7 点'],['C','睡前 3 小时内'],['D','其他时间'],['E','几乎不进行剧烈运动']] },
        { id: 'q14', type: 'radio', title: '您每天最后喝含咖啡因饮品的时间是？', options: [['A','下午2点前'],['B','下午2-6点'],['C','下午6点后'],['D','偶尔喝/不喝']] },
        { id: 'q15', type: 'radio', title: '每周有多少天在傍晚接触自然光？', options: [['A','每周5-7天'],['B','每周3-4天'],['C','几乎没有']] },
        { id: 'q16', type: 'radio', title: '您有午睡习惯吗？', options: [['A','有固定习惯'],['B','偶尔午睡'],['C','几乎不午睡']] },
        { id: 'q17', type: 'radio', title: '通常您午睡的时长是多久？', options: [['A','20分钟以内'],['B','20-60分钟'],['C','超过60分钟'],['D','不确定'],['E','不午睡']] },
        { id: 'q18', type: 'checkbox', title: '躺下30分钟还没入睡，您会？（可多选）', options: [['A','继续躺着尝试入睡'],['B','起床等困了再睡'],['C','在床上看书/玩手机']] }
    ];

    const measures = {
        m1: { title: "清晨光照补给", desc: "建议起床后30-60分钟内接触自然光，精准重置大脑生物钟起点。" },
        m2: { title: "延迟咖啡因摄入", desc: "将首杯咖啡推迟至起后90分钟，待腺苷自然代谢，避免午后精力崩盘。" },
        m3: { title: "午后咖啡禁令", desc: "入睡前8-10小时停止摄入咖啡因，确保受体不被干扰。" },
        m4: { title: "日落光影重塑", desc: "傍晚接触红光光谱，诱发自然褪黑素分泌。" },
        m6: { title: "营造清凉眠环境", desc: "将卧室温度调至18-22℃，开启身体深度睡眠开关。" },
        m7: { title: "重新规划运动窗口", desc: "高强度训练应在睡前4小时前完成，给核心体温降温时间。" },
        m8: { title: "动力午休限制", desc: "午睡控制在20分钟内，避免深睡后的认知迟钝。" },
        m9: { title: "锚定起床时间", desc: "每天同一时间起床，这是对抗社交时差的最强手段。" },
        m10: { title: "数字化日落", desc: "睡前1小时远离蓝光屏幕，建立大脑进入夜晚的仪式感。" },
        m12: { title: "刺激控制逻辑", desc: "20分钟未入睡请果断离床，避免床与焦虑产生关联。" }
    };

    let userAnswers = {};
    let pageHistory = ['home'];

    const container = document.getElementById('question-container');
    qData.forEach((q, idx) => {
        const div = document.createElement('div');
        div.id = `page-${q.id}`;
        div.className = 'page';
        div.innerHTML = `
            <button class="back-btn" onclick="prevPage()">← 返回</button>
            <div class="q-number">Step ${idx + 1} / 18</div>
            <div class="q-title">${q.title}</div>
            ${q.desc ? `<div class="q-desc">${q.desc}</div>` : ''}
            <div class="options-grid">${q.options.map(opt => `<div class="option-item" onclick="handleSelect('${q.id}', '${opt[0]}', ${q.type==='checkbox'})">${opt[1]}</div>`).join('')}</div>
            ${q.type === 'checkbox' ? `<button class="btn-main" onclick="checkRedirect('${q.id}')">继续下一步</button>` : ''}
        `;
        container.appendChild(div);
    });

    function handleSelect(qid, val, isMulti) {
        if (!isMulti) {
            userAnswers[qid] = val;
            window.event.currentTarget.parentElement.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected'));
            window.event.currentTarget.classList.add('selected');
            setTimeout(() => {
                const idx = qData.findIndex(q => q.id === qid);
                nextPage(qData[idx+1] ? qData[idx+1].id : 'end');
            }, 250);
        } else {
            if (!userAnswers[qid]) userAnswers[qid] = [];
            const pos = userAnswers[qid].indexOf(val);
            if (pos > -1) userAnswers[qid].splice(pos, 1);
            else userAnswers[qid].push(val);
            window.event.currentTarget.classList.toggle('selected');
        }
    }

    function checkRedirect(qid) {
        if (qid === 'q6') {
            const hasIssues = userAnswers.q6 && userAnswers.q6.some(v => v !== 'E');
            if (hasIssues) {
                showMedicalAdvice();
                return;
            }
        }
        const idx = qData.findIndex(q => q.id === qid);
        nextPage(qData[idx+1] ? qData[idx+1].id : 'end');
    }

    function nextPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if (id === 'end') {
            document.getElementById('p-bar').style.width = '100%';
            document.getElementById('page-loading').classList.add('active');
            setTimeout(showResults, 4000);
        } else {
            const idx = qData.findIndex(q => q.id === id);
            document.getElementById('p-bar').style.width = `${(idx / 18) * 100}%`;
            document.getElementById(`page-${id}`).classList.add('active');
            pageHistory.push(id);
        }
    }

    function prevPage() {
        if (pageHistory.length > 1) {
            pageHistory.pop();
            const prev = pageHistory[pageHistory.length-1];
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(prev === 'home' ? 'page-home' : `page-${prev}`).classList.add('active');
        }
    }

    function showMedicalAdvice() {
        document.getElementById('p-bar').style.width = '100%';
        const resDiv = document.getElementById('result-container');
        resDiv.innerHTML = `
            <div class="page active">
                <div class="q-title" style="color:var(--g-red); margin-top:40px;">专业建议</div>
                <div class="warning-box">
                    疾病和服药对失眠的影响，在当下都远大于改变生活习惯的效果。为了您的健康，请咨询专业医疗人士。我们希望您在恢复身心健康后再进行测试，届时通过改变生活习惯来进一步提升睡眠质量。
                </div>
                <button class="btn-main" onclick="location.reload()">重新测评</button>
            </div>
        `;
    }

    function showResults() {
        document.getElementById('page-loading').classList.remove('active');
        let k = [];
        if (['B','C'].includes(userAnswers.q10)) k.push('m9');
        if (['B','C','D'].includes(userAnswers.q11)) k.push('m1');
        if (['A','B'].includes(userAnswers.q12)) k.push('m2');
        if (['B','C'].includes(userAnswers.q14)) k.push('m3');
        if (userAnswers.q15 === 'C') k.push('m4');
        if (userAnswers.q8 === 'A' || userAnswers.q8 === 'D') k.push('m10');
        if (['B','C','D'].includes(userAnswers.q9)) k.push('m6');
        
        finalKeys = [...new Set(k)].slice(0, 5);
        if (finalKeys.length < 3) finalKeys.push('m1', 'm9');
        renderMeasureStep(0);
    }

    function renderMeasureStep(idx) {
        const resDiv = document.getElementById('result-container');
        const data = measures[finalKeys[idx]];
        
        let overtimeMsg = "";
        if (idx === 0) {
            if (userAnswers.q5 === 'C') overtimeMsg = `<div class="warning-box">经常加班可能会阻碍您通过改变生活习惯来改善睡眠质量。虽然加班节奏可能超出了您的掌控，但当您尝试做到本测评提供的生活习惯改变时，对您的睡眠提升一定是有帮助的。</div>`;
            if (userAnswers.q5 === 'D') overtimeMsg = `<div class="warning-box">长期高强度加班会阻碍您通过改变生活习惯来改善睡眠质量。由于客观环境压力巨大，本测评对您的即时帮助可能有限，但坚持改善生活习惯是长效提升睡眠的基础。</div>`;
        }

        resDiv.innerHTML = `
            <div class="page active">
                ${overtimeMsg}
                <div class="q-number" style="color:var(--g-blue)">Solution ${idx + 1} / ${finalKeys.length}</div>
                <div class="q-title" style="font-weight:500;">${data.title}</div>
                <p style="font-size:18px; line-height:1.8; color:var(--g-sub); max-width:600px; margin: 0 auto 40px;">${data.desc}</p>
                <button class="btn-main" onclick="${idx < finalKeys.length - 1 ? `renderMeasureStep(${idx+1})` : 'renderSummary()'}">
                    ${idx < finalKeys.length - 1 ? '继续查看' : '查看方案汇总'}
                </button>
            </div>
        `;
    }

    function renderSummary() {
        const resDiv = document.getElementById('result-container');
        const listItems = finalKeys.map(k => `<li>${measures[k].title}</li>`).join('');
        resDiv.innerHTML = `
            <div class="page active">
                <div class="summary-container">
                    <div class="summary-header">您的睡眠重塑计划</div>
                    <ul class="summary-list">${listItems}</ul>
                    <div style="margin-top:80px; font-size:12px; color:#AAA; letter-spacing:3px">DEEP SLEEP LAB · 愿您今夜好眠</div>
                </div>
                <button class="btn-main" style="margin-top:60px" onclick="location.reload()">重新测评</button>
            </div>
        `;
    }
</script>
</body>
</html>
